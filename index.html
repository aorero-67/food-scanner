<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshScan | Minimalist Luxury</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Noto Sans Thai', 'sans-serif'],
                    },
                    colors: {
                        lux: {
                            900: '#0a0a0a',
                            800: '#171717',
                            700: '#262626',
                            gold: '#d4af37',
                            muted: '#a3a3a3'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 antialiased selection:bg-white/20">

    <!-- Main Container -->
    <main class="relative w-full max-w-md minimal-glass rounded-[2rem] overflow-hidden flex flex-col shadow-[0_30px_60px_rgba(0,0,0,0.6)]">
        
        <!-- Header Minimalist -->
        <header class="pt-8 pb-4 px-8 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-medium tracking-wide uppercase text-white/90">FreshScan</h1>
                <p class="text-[10px] font-light text-lux-muted tracking-widest uppercase mt-1">Food Quality Analysis</p>
            </div>
            
            <!-- Camera Switch Button -->
            <button onclick="toggleCamera()" class="p-2.5 rounded-full minimal-glass hover:bg-white/10 transition-colors active:scale-95" title="สลับกล้อง">
                <svg class="w-5 h-5 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
            </button>
        </header>

        <!-- Camera Viewport -->
        <div class="px-6 py-2 relative">
            <div class="relative w-full aspect-[3/4] bg-lux-900 rounded-[1.5rem] overflow-hidden border border-white/5 shadow-inner">
                <video id="camera-stream" autoplay playsinline class="object-cover w-full h-full transition-opacity duration-500"></video>
                
                <div class="absolute inset-0 bg-gradient-to-t from-lux-900/60 to-transparent pointer-events-none"></div>
                
                <!-- Minimalist Target Reticle -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div class="relative w-24 h-24">
                        <div class="absolute top-0 left-0 reticle-corner border-t-[1.5px] border-l-[1.5px] rounded-tl-md"></div>
                        <div class="absolute top-0 right-0 reticle-corner border-t-[1.5px] border-r-[1.5px] rounded-tr-md"></div>
                        <div class="absolute bottom-0 left-0 reticle-corner border-b-[1.5px] border-l-[1.5px] rounded-bl-md"></div>
                        <div class="absolute bottom-0 right-0 reticle-corner border-b-[1.5px] border-r-[1.5px] rounded-br-md"></div>
                        
                        <!-- Center dot -->
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-1 h-1 bg-white/80 rounded-full"></div>
                    </div>
                </div>

                <!-- Status Badge -->
                <div class="absolute top-4 left-4 px-3 py-1 rounded-full minimal-glass flex items-center space-x-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-white animate-pulse-slow"></div>
                    <span class="text-[9px] font-medium tracking-widest text-white/80 uppercase">Scanner Active</span>
                </div>
            </div>
        </div>

        <!-- Controls & Dashboard -->
        <div class="p-6 flex flex-col space-y-4">
            
            <!-- Result Panel -->
            <div id="result-dashboard" class="minimal-glass rounded-2xl p-5 transition-all duration-500 ease-out min-h-[95px] flex flex-col justify-center relative overflow-hidden">
                <h3 class="text-[9px] font-medium tracking-[0.25em] text-white/40 uppercase mb-1">Status</h3>
                <p id="status-text" class="text-sm font-light text-white/90">Waiting for analysis...</p>
                
                <div id="color-details" class="mt-3 flex items-center space-x-3 opacity-0 transition-opacity duration-300 h-0 overflow-hidden">
                    <div id="color-preview" class="w-4 h-4 rounded-full border border-white/20"></div>
                    <p id="rgb-value" class="text-[10px] font-mono text-white/40 tracking-wider"></p>
                </div>

                <!-- Decorative elegant glow that activates on scan -->
                <div id="status-glow" class="absolute inset-0 opacity-0 transition-opacity duration-700 mix-blend-overlay pointer-events-none"></div>
            </div>

            <!-- Scan Button -->
            <button id="scan-btn" onclick="scanColor()" 
                class="btn-lux w-full py-4 rounded-2xl font-semibold tracking-[0.15em] text-[11px] uppercase flex items-center justify-center space-x-2">
                <span>Analyze Quality</span>
            </button>
            
        </div>
    </main>

    <script>
        const videoElement = document.getElementById('camera-stream');
        const resultDashboard = document.getElementById('result-dashboard');
        const statusText = document.getElementById('status-text');
        const colorDetails = document.getElementById('color-details');
        const rgbValueText = document.getElementById('rgb-value');
        const colorPreview = document.getElementById('color-preview');
        const statusGlow = document.getElementById('status-glow');

        // State for camera
        let currentFacingMode = "environment";
        let currentStream = null;

        async function startCamera() {
            // Stop existing stream if any (essential for switching cameras)
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            
            // Fade out video briefly
            videoElement.style.opacity = '0';
            
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode },
                    audio: false
                });
                videoElement.srcObject = currentStream;
                videoElement.onloadedmetadata = () => {
                    videoElement.style.opacity = '1';
                };
            } catch (error) {
                console.error("Camera error: ", error);
                statusText.innerHTML = "Camera Access Denied<br><span class='text-[10px] text-white/40 font-light tracking-wide'>Please check permissions or use HTTPS.</span>";
            }
        }

        function toggleCamera() {
            if (navigator.vibrate) navigator.vibrate(20); // Subtle haptic
            currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
            startCamera();
        }

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; } 
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [h * 360, s * 100, l * 100];
        }

        function scanColor() {
            if (navigator.vibrate) navigator.vibrate(40);
            if (!videoElement.videoWidth) return;

            // Minimalist flash effect
            videoElement.style.opacity = '0.3';
            setTimeout(() => videoElement.style.opacity = '1', 200);

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d', { willReadFrequently: true });
            
            canvas.width = videoElement.videoWidth;
            canvas.height = videoElement.videoHeight;
            context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            
            const boxSize = 12;
            const centerX = Math.floor(canvas.width / 2);
            const centerY = Math.floor(canvas.height / 2);
            const imageData = context.getImageData(centerX - boxSize/2, centerY - boxSize/2, boxSize, boxSize);
            const data = imageData.data;
            
            let r = 0, g = 0, b = 0;
            const count = boxSize * boxSize;
            
            for (let i = 0; i < data.length; i += 4) {
                r += data[i]; g += data[i+1]; b += data[i+2];
            }
            r = Math.round(r / count); g = Math.round(g / count); b = Math.round(b / count);

            analyzeColor(r, g, b);
        }

        function analyzeColor(r, g, b) {
            const [h, s, l] = rgbToHsl(r, g, b);
            
            // Show details elegantly
            colorDetails.style.height = 'auto';
            colorDetails.style.opacity = '1';
            colorPreview.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
            rgbValueText.innerText = `R${r} G${g} B${b} • H${Math.round(h)} S${Math.round(s)} L${Math.round(l)}`;
            
            const isRed = (h < 35 || h > 330) && s > 20 && l > 15 && l < 85;
            const isGreen = h >= 60 && h <= 160 && s > 20 && l > 15 && l < 85;

            // Reset glow
            statusGlow.className = "absolute inset-0 opacity-0 transition-opacity duration-700 mix-blend-overlay pointer-events-none";

            if (isGreen) {
                statusText.innerText = "อาหารยังไม่บูด (ปลอดภัย)";
                statusText.className = "text-base font-medium text-emerald-400 mt-1";
                statusGlow.classList.add("bg-gradient-to-r", "from-emerald-500/20", "to-transparent", "opacity-100");
            } else if (isRed) {
                statusText.innerText = "อาหารบูดแล้ว! (ห้ามรับประทาน)";
                statusText.className = "text-base font-medium text-red-400 mt-1";
                statusGlow.classList.add("bg-gradient-to-r", "from-red-500/20", "to-transparent", "opacity-100");
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
            } else {
                statusText.innerText = "ไม่สามารถระบุได้ กรุณาเล็งใหม่อีกครั้ง";
                statusText.className = "text-sm font-light text-white/60 mt-1";
                statusGlow.classList.add("bg-gradient-to-r", "from-white/5", "to-transparent", "opacity-100");
            }
        }

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
